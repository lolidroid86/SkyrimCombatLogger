[Log]
; Log hit events (TESHitEvent) — who hit whom with what weapon/spell/MGEF
LogHits=true

; Log combat state changes (entered/exited combat, searching)
LogCombat=true

; Log actor deaths with killer info
LogDeaths=true

; Annotate actors with [F] when they are in CurrentFollowerFaction
LogFactions=true

; Include MGEF editor ID in hit lines (e.g. _MB_EnchLightsaberMGEF_Green)
LogMGEFName=true

; Only log events where at least one actor is a current follower.
; Reduces log spam in combat-heavy areas.
OnlyFollowers=false

[Combat]
; When a follower enters combat with another follower, immediately queue
; StopCombat on both. Covers NFF-managed, vanilla hired, and temp companions.
; The hit still lands but the combat state is cleared before AI can escalate.
BlockFollowerHits=true

; On game load, sweep all active followers and clear any lingering combat state
; left over from the previous session.
ResetFollowerCombatOnLoad=true

[Filter]
; Comma-separated list of MGEF FormIDs (hex) to suppress from [MGEF] log lines.
; Useful for MGEFs that fire as events but are handled by a patch ESP.
; Example: ExcludeMGEF=870CF8BB,870CF8B8
ExcludeMGEF=
